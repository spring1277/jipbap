<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e8552d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="집밥">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>우리집 집밥 레시피</title>
</head>
<body>
  <header class="app-header">
    <h1 id="header-title">우리집 집밥</h1>
    <button id="btn-add" class="header-add" aria-label="레시피 추가">＋</button>
  </header>

  <main id="view" class="view"><!-- 화면은 app.js가 렌더링합니다 --></main>

  <nav class="tabbar">
    <button class="tab" data-tab="home">
      <span class="tab-icon">🍚</span><span class="tab-label">가족·식단</span>
    </button>
    <button class="tab" data-tab="recipes">
      <span class="tab-icon">📖</span><span class="tab-label">레시피</span>
    </button>
    <button class="tab" data-tab="search">
      <span class="tab-icon">🔍</span><span class="tab-label">검색·추천</span>
    </button>
    <button class="tab" data-tab="more">
      <span class="tab-icon">⚙️</span><span class="tab-label">더보기</span>
    </button>
  </nav>

  <!-- 레시피 추가/수정 모달 -->
  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true">
      <div class="modal-head">
        <button id="modal-cancel" class="link-btn">취소</button>
        <strong id="modal-title">레시피 추가</strong>
        <button id="modal-save" class="link-btn primary">저장</button>
      </div>
      <div id="modal-body" class="modal-body"><!-- 폼은 app.js가 렌더링 --></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
